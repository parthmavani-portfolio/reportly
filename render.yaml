services:
  - type: web
    name: reportly
    runtime: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      python setup_nltk.py
      apt-get update && apt-get install -y poppler-utils
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
